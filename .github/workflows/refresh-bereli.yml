name: Refresh Bereli Catalog

on:
  schedule:
    - cron: '0 7 * * *'   # Daily at 07:00 UTC (1 hr after EuroOptic)
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch Bereli catalog from AmmoFeeds
        run: node .github/scripts/fetch-bereli.js

      - name: Commit and push updated catalog
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/bereli-*.json data/bereli-last-run.json
          git diff --staged --quiet || git commit -m "Auto-update Bereli catalog [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
