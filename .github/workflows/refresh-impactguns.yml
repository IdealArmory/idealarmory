name: Refresh Impact Guns Catalog

on:
  schedule:
    - cron: '0 8 * * *'   # Daily at 08:00 UTC (1 hr after Bereli)
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch Impact Guns catalog
        run: node .github/scripts/fetch-impactguns.js

      - name: Commit and push updated catalog
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/impactguns-*.json data/impactguns-last-run.json
          git diff --staged --quiet || git commit -m "Auto-update Impact Guns catalog [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
