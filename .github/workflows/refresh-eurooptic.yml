name: Refresh EuroOptic Catalog

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:
  fetch-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch EuroOptic catalog from Impact.com
        env:
          IMPACT_ACCOUNT_SID: ${{ secrets.IMPACT_ACCOUNT_SID }}
          IMPACT_AUTH_TOKEN:  ${{ secrets.IMPACT_AUTH_TOKEN }}
          IMPACT_CATALOG_ID:  ${{ secrets.IMPACT_CATALOG_ID }}
        run: node .github/scripts/fetch-eurooptic.js

      - name: Commit and push updated catalog
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/eurooptic-*.json
          git diff --staged --quiet || git commit -m "Auto-update EuroOptic catalog [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
